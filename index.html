<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanshi's Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #ffe6ea;
            --card-bg: #ffffff;
            --text-main: #ff5e7e;
            --text-dark: #4a4a4a;
            --btn-color: #ff8fa3;
            --btn-hover: #ff5e7e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(#ffb6c1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .invitation-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 94, 126, 0.15);
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: var(--text-main);
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-dark);
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .details {
            background: #fff0f3;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px dashed #ffb6c1;
        }

        .detail-item {
            margin: 12px 0;
            color: var(--text-dark);
            font-size: 1.05rem;
        }

        .detail-item span {
            font-weight: bold;
            color: var(--text-main);
        }

        .rsvp-btn {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-family: 'Fredoka One', cursive;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 143, 163, 0.4);
        }

        .rsvp-btn:hover {
            background-color: var(--btn-hover);
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 94, 126, 0.5);
        }

        .decor {
            font-size: 2rem;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        <div class="decor">✨ 🎀 ✨</div>
        <h1>You're Invited!</h1>
        <div class="subtitle">To celebrate Vanshi's Birthday</div>
        
        <div class="details">
            <div class="detail-item"><span>📅 Date:</span> Saturday, 20th June</div>
            <div class="detail-item"><span>⏰ Time:</span> 08:00 PM Onwards</div>
            <div class="detail-item"><span>📍 Venue:</span> My Bar Headquaters</div>
            <div class="detail-item"><span>👗 Theme:</span> Sorryyy Vanshuuuu</div>
        </div>

        <button class="rsvp-btn" onclick="triggerRSVP()">RSVP NOW 💌</button>
    </div>

    <script>
        function triggerRSVP() {
            // Confetti burst
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ffc0cb', '#ff69b4', '#ffffff', '#ffb6c1']
            });

            // Sweet alert substitution
            setTimeout(() => {
                alert("Yay! Can't wait to see you there! 🎉\n(Don't forget to message me to confirm!)");
            }, 500);
        }
    </script>

</body>
</html>
